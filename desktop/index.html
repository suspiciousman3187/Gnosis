<!doctype html>
<html lang="en" data-theme="gnosis" data-bgfit="center">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gnosis</title>
    <!--
      SYNCHRONOUS theme hydration. Reads the user's saved theme / brightness
      / bgfit from localStorage and writes them onto <html> BEFORE the boot
      splash paints, so the splash adopts the same wallpaper + dim wash the
      user sees inside the app instead of flashing the default-theme look on
      every cold start. Mirrors THEME_BG_FIT and the localStorage keys from
      App.tsx (THEME_KEY = 'ff_theme', BG_BRIGHTNESS_KEY = 'ff_bg_brightness').
      Must run before the boot-splash <style> rules apply.
    -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var t = localStorage.getItem('ff_theme');
          // Legacy alias: old saves of 'meadow' (the green theme's previous id)
          // migrate to the new 'gnosis' id on load. App.tsx writes the new value
          // back to localStorage so this only fires once.
          if (t === 'meadow') t = 'gnosis';
          var allowed = { gnosis: 1, dawn: 1, crimson: 1, minimal: 1, styx: 1, meadow: 1 };
          if (t && allowed[t]) root.dataset.theme = t;
          var fitMap = { gnosis: 'center', dawn: 'cover', meadow: 'center', crimson: 'center', minimal: 'cover', styx: 'cover' };
          root.dataset.bgfit = fitMap[root.dataset.theme] || 'center';
          var b = parseFloat(localStorage.getItem('ff_bg_brightness') || '1');
          if (isFinite(b)) {
            root.style.setProperty('--styx-user-dim', String(Math.max(0, Math.min(0.9, 1 - b))));
          }
        } catch (e) { /* localStorage unavailable — fall through to gnosis defaults */ }
      })();
    </script>
    <!--
      Boot-time splash. Inlined in head so it paints on the very first
      WebView frame  Ebefore /src/main.tsx loads, before styles.css loads,
      before React mounts. Otherwise the user sees a flash of white between
      the WebView attaching and React's first commit (visible for ~200ms on
      a cold start). All styling is self-contained here so it doesn't
      depend on Tailwind or themes.css being available yet.

      React mounts into #root via main.tsx ↁEthe splash markup below is
      replaced by App's tree on first render. The CSS rules stay defined
      but become inert once #root has React children.
    -->
    <style>
      /* Theme palette + wallpaper vars — duplicated from web/app/themes.css so
         the boot splash can render the active theme's wallpaper BEFORE the
         main stylesheet bundle loads. Keep in sync with themes.css if a
         wallpaper / color is retuned. Only the keys the splash needs are
         listed (background color, wallpaper URL, dim wash, glow). */
      :root, :root[data-theme="gnosis"], :root[data-theme="meadow"] {
        --color-background: #1a2b22;
        --bg-wallpaper: url('/bg-meadow.jpg?v=3');
        --bg-glow: rgba(240, 192, 98, 0.25);
        --bg-dim:  rgba(30, 80, 55, 0.55);
      }
      :root[data-theme="dawn"] {
        --color-background: #121a28;
        --bg-wallpaper: url('/bg-default.webp?v=1');
        --bg-glow: rgba(232, 162, 74, 0.22);
        --bg-dim:  rgba(14, 22, 38, 0.62);
      }
      :root[data-theme="styx"] {
        --color-background: #141618;
        --bg-wallpaper: url('/StyxBackground.webp?v=2');
        --bg-glow: rgba(242, 176, 58, 0.12);
        --bg-dim:  rgba(13, 11, 9, 0.46);
      }
      :root[data-theme="crimson"] {
        --color-background: #0f0f11;
        --bg-wallpaper: url('/bg-overlay.jpg?v=2');
        --bg-glow: rgba(165, 44, 44, 0.20);
        --bg-dim:  rgba(23, 23, 28, 0.80);
      }
      :root[data-theme="minimal"] {
        --color-background: #141618;
        --bg-wallpaper: none;
        --bg-glow: rgba(242, 176, 58, 0.06);
        --bg-dim:  rgba(15, 15, 17, 0.85);
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--color-background, #121a28);
        color: #e8e8e8;
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
      }
      #root { height: 100%; }
      .boot-splash {
        position: fixed;
        inset: 0;
        z-index: 50;
        /* Solid theme color is the floor — the wallpaper + dim layers paint
           on top via the pseudo elements below. Falls back to dawn's color
           if a var didn't resolve (e.g. a never-seen theme value). */
        background-color: var(--color-background, #121a28);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        user-select: none;
        pointer-events: none;
        opacity: 0;
        transition: opacity 200ms ease-out 350ms;
        overflow: hidden;
      }
      /* Wallpaper layer — mirrors .styx-bg::before from themes.css. The
         flex children (caption / stage / quote) render above this without
         needing explicit z-index because absolute-positioned pseudo
         elements don't participate in the flex flow. */
      .boot-splash::before {
        content: ''; position: absolute; inset: 0;
        background-image: var(--bg-wallpaper);
        background-size: cover; background-position: center top; background-repeat: no-repeat;
        pointer-events: none;
      }
      :root[data-bgfit="contain"] .boot-splash::before { background-size: contain;   background-position: center; }
      :root[data-bgfit="right"]   .boot-splash::before { background-size: auto 100%; background-position: right center; }
      :root[data-bgfit="left"]    .boot-splash::before { background-size: auto 100%; background-position: left center; }
      :root[data-bgfit="center"]  .boot-splash::before { background-size: cover;     background-position: center center; }
      /* Glow + dim wash — mirrors .styx-bg::after. Includes the user
         brightness slider via --styx-user-dim (set by the hydration
         script above). */
      .boot-splash::after {
        content: ''; position: absolute; inset: 0;
        background:
          radial-gradient(1100px 460px at 50% -12%, var(--bg-glow), transparent 70%),
          linear-gradient(rgba(0, 0, 0, var(--styx-user-dim, 0)), rgba(0, 0, 0, var(--styx-user-dim, 0))),
          linear-gradient(var(--bg-dim), var(--bg-dim));
        pointer-events: none;
      }
      /* Splash content (caption, stage, quote) must sit above the pseudo
         layers — give them position so z-index applies. */
      .boot-splash > * { position: relative; z-index: 1; }
      .boot-splash.is-visible { opacity: 1; }
      .boot-splash.is-exiting { opacity: 0; transition: opacity 450ms ease-out; }
      .boot-splash-stage {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .boot-splash-translate {
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: boot-splash-translate 1.6s infinite both;
      }
      .boot-splash-scale {
        width: 104px;
        height: 104px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: boot-splash-scale 1.6s infinite both;
      }
      .boot-splash-rotate {
        display: block;
        width: 104px;
        height: 104px;
        object-fit: contain;
        transform-origin: center center;
        animation: boot-splash-rotate 1.6s infinite both;
        filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.4));
      }
      .boot-splash-caption {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: #cfcfd2;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
        margin: 0;
      }
      .boot-splash-quote {
        max-width: 32rem;
        padding: 0 2rem;
        text-align: center;
        font-style: italic;
        font-weight: 300;
        font-size: 1.5rem;
        line-height: 1.6;
        color: #f5f5f5;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9), 0 2px 20px rgba(0, 0, 0, 0.7);
        opacity: 0;
        animation: boot-splash-quote-in 950ms 80ms ease-out forwards;
        margin: 0;
      }
      @keyframes boot-splash-quote-in {
        from { opacity: 0; transform: translateY(14px); filter: blur(6px); }
        to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
      }
      .boot-splash-dots > span {
        display: inline-block;
        opacity: 0;
      }
      .boot-splash-dots > span:nth-child(1) { animation: boot-splash-dot-1 1.4s infinite both; }
      .boot-splash-dots > span:nth-child(2) { animation: boot-splash-dot-2 1.4s infinite both; }
      .boot-splash-dots > span:nth-child(3) { animation: boot-splash-dot-3 1.4s infinite both; }

      @keyframes boot-splash-translate {
        0%, 7.5% { transform: translateY(0); }
        28.125%  { transform: translateY(-14px); }
        46%      { transform: translateY(0); }
        55%      { transform: translateY(-4px); }
        64%      { transform: translateY(0); }
        72%      { transform: translateY(-1.5px); }
        81.25%   { transform: translateY(0); }
        100%     { transform: translateY(0); }
      }
      @keyframes boot-splash-scale {
        0%      { transform: scale(1);    animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1); }
        7.5%    { transform: scale(0.88); animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1); }
        25%     { transform: scale(1.14); animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
        81.25%  { transform: scale(1);    animation-timing-function: linear; }
        100%    { transform: scale(1); }
      }
      @keyframes boot-splash-rotate {
        0%, 7.5%     { transform: rotate(0deg); animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
        81.25%, 100% { transform: rotate(1080deg); }
      }
      @keyframes boot-splash-dot-1 {
        0%,   21.43% { opacity: 0; }
        21.44%, 100% { opacity: 1; }
      }
      @keyframes boot-splash-dot-2 {
        0%,   39.29% { opacity: 0; }
        39.30%, 100% { opacity: 1; }
      }
      @keyframes boot-splash-dot-3 {
        0%,   57.14% { opacity: 0; }
        57.15%, 100% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash-translate, .boot-splash-scale, .boot-splash-rotate,
        .boot-splash-dots > span { animation: none; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Boot splash lives OUTSIDE #root so React's createRoot().render()
      doesn't wipe it. Stays overlaid at z-index 50 while App mounts
      underneath, then main.tsx fades it out — gives a smooth cross-fade
      instead of an instant jump from splash to UI.
    -->
    <div id="boot-splash" class="boot-splash">
        <p class="boot-splash-caption">Now Loading<span class="boot-splash-dots"><span>.</span><span>.</span><span>.</span></span></p>
        <div class="boot-splash-stage">
          <div class="boot-splash-translate">
            <div class="boot-splash-scale">

        <p class="boot-splash-quote" id="boot-splash-quote"></p>
        <!--
          Pick a boot-splash quote synchronously so it paints with the rest
          of the splash. main.tsx is module-deferred and won't run until
          after the bundle downloads — populating the quote there made it
          appear half a second late. The inline script runs the instant the
          parser hits it (no defer/async), so textContent is set before
          the .boot-splash-quote fade-in animation's 80 ms delay even
          starts. Small inline set of well-known public-domain aphorisms;
          React's RotatingQuote takes over with the full pool once mounted.
        -->
        <script>
          (function () {
            var qs = [
              '“The unexamined life is not worth living.”',
              '“Know thyself.”',
              '“I know that I know nothing.”',
              '“Real knowledge is to know the extent of one’s ignorance.”'
            ];
            var el = document.getElementById('boot-splash-quote');
            if (el) el.textContent = qs[Math.floor(Math.random() * qs.length)];
          })();
        </script>
    </div>
    <!--
      Window is created visible=false (tauri.conf.json) so users don't see
      Tauri's white default frame before WebView2 attaches. Two RAF ticks
      wait for the splash markup to lay out + paint, then we ask Rust to
      reveal the window  Eby which point the splash is already on screen,
      so the user's first paint of the OS window is dark + splash, not
      white. main.tsx loads after this script so the window-show isn't
      blocked behind the React bundle download.
    -->
    <script>
      // Boot splash + show_main_window apply ONLY to the main app window. The
      // overlay window (label "overlay", url=index.html#overlay) loads the
      // same HTML — without this gate it would paint the loading screen over
      // the transparent always-on-top DPS meter and show the main window when
      // the overlay opens.
      //
      // For the main window the splash is delay-shown: starts opacity 0 with
      // a 350ms transition delay; .is-visible arms the fade-in. Setting it
      // immediately here starts the grace clock at page-load time — on warm
      // boots where main.tsx mounts within ~350ms, it adds .is-exiting before
      // the fade-in begins and the splash never paints. Cold boots that take
      // longer get the splash as reassurance.
      (function () {
        var isOverlay = window.location.hash === '#overlay';
        var s = document.getElementById('boot-splash');
